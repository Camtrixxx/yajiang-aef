experiment:
  name: aef_hyh_yajiang_v1
  seed: 42
  output_dir: /workspace/hyh/yajiang-aef/outputs/aef_hyh_yajiang_v1

data:
  dataset_type: yajiang_open
  manifest_path: /workspace/raw/yajiang_open/manifests/train.jsonl
  stats_dir: /workspace/statistics/yajiang_open

  batch_size: 2
  num_workers: 4
  image_size: 128
  max_frames: 16
  num_samples: 0

  num_classes: 11
  metadata_dim: 4

  input_sources:
    - s2
    - s1
    - hls

  target_sources:
    - name: dem
      loss_type: continuous
      out_channels: 1
    - name: worldcover
      loss_type: categorical
      out_channels: 11
    - name: jrc_water
      loss_type: categorical
      out_channels: 2

model:
  input_dim: 6
  stem_dim: 128
  precision_dim: 256
  embedding_dim: 128

  time_code_dim: 64
  window_code_dim: 64
  relative_time_code_dim: 16

  metadata_dim: 4

  num_blocks: 4
  num_heads: 4
  vmf_kappa: 2000.0
  skip_l2_training: true
  gradient_checkpointing: false
  decoder_hidden_mult: 1

  # 每种输入源实际通道数
  source_channels:
    s2: 6
    s1: 2
    hls: 6

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.01
  grad_clip_norm: 1.0

  reconstruction_weight: 1.0
  uniformity_weight: 0.3
  variance_weight: 1.0
  decorrelation_weight: 0.01
  orthogonality_weight: 1.0

evaluation:
  knn_k: 5